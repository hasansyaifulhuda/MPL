<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPL Standings</title>

  <link rel="icon" type="image/png" href="assets/logos/mpl.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

  <!-- =========================
       MAIN LAYOUT
  ========================= -->
  <div class="main-layout">

    <!-- =========================
         LEFT : TABLE
    ========================= -->
    <div class="left-content">

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="rank-h">RANK</th>
              <th class="team-h">TEAM</th>
              <th>MATCH POINT</th>
              <th>MATCH W-L</th>
              <th>NET GAME WIN</th>
              <th>GAME W-L</th>
            </tr>
          </thead>

          <tbody id="table"></tbody>
        </table>
      </div>

    </div>

    <!-- =========================
         RIGHT : SCHEDULE
    ========================= -->
    <div class="right-content">

      <div class="schedule-container">
        <div id="schedule"></div>
      </div>

    </div>

  </div>

</div>

<!-- =========================
     SCRIPT
========================= -->
<script type="module" src="app.js"></script>

</body>
</html>
